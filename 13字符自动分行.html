<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>13 字符自动分行工具</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card: #fff;
            --accent: #0077ff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 1rem 0;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            font-family: "Courier New", Courier, monospace;
            font-size: 1rem;
            line-height: 1.4;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            min-height: 120px;
        }
        .card {
            background: var(--card);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .copy-btn {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        .copy-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>13 字符自动分行工具</h1>

        <div class="card">
            <label for="input">输入任意 ASCII 文本</label>
            <textarea id="input" placeholder="随便输入，每 13 个字符自动换行"></textarea>
        </div>

        <div class="card">
            <label for="output">分行结果（每行 13 字符）</label>
            <textarea id="output" readonly></textarea>
            <button id="copyBtn" class="copy-btn">复制结果</button>
        </div>
    </div>

    <script>
        const input  = document.getElementById('input');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        function update() {
            const str = input.value;
            if (!str) { output.value = ''; return; }
            let res = '';
            for (let i = 0; i < str.length; i += 13) {
                res += str.slice(i, i + 13) + '\n';
            }
            output.value = res.trimEnd();
        }
        input.addEventListener('input', update);

        copyBtn.addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
            copyBtn.textContent = '已复制';
            setTimeout(() => copyBtn.textContent = '复制结果', 1500);
        });

        update(); // 初始化
    </script>
</body>
</html>
